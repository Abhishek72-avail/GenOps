kind = "web"
previewPath = "/"
title = "Generator Management System"
version = "1.0.0"
id = "artifacts/generator-mgmt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18336

[services.development]
run = "pnpm --filter @workspace/generator-mgmt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/generator-mgmt", "run", "build" ]
publicDir = "artifacts/generator-mgmt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18336"
BASE_PATH = "/"
