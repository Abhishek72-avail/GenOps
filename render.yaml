databases:
  - name: generator-db
    plan: free
    databaseName: generatordb
    user: gmsuser

services:
  - type: web
    name: generator-dashboard
    env: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: generator-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
